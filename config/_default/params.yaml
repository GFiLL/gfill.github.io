# SITE SETUP
# Guide: https://docs.hugoblox.com/tutorial/
# Documentation: https://docs.hugoblox.com/
# This file is formatted using YAML syntax - learn more at https://learnxinyminutes.com/docs/yaml/

# Appearance
appearance:
  mode: system
  color: blue
  custom_css:
    - "https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css"

# SEO
marketing:
  seo:
    site_type: Person
    local_business_type: ''
    org_name: 'Toulouse School of Economics'
    description: 'I am a PhD candidate at the Toulouse School of economics. My work covers topics related to education and labour economics. In particular, I am interested in how funding instruments and educational tracks affect students decisions and labour market outcomes.'
    twitter: ''
  analytics:
    google_analytics: ''
    baidu_tongji: ''
    plausible: ''
    fathom: ''
    pirsch: ''
  verification:
    google: 'google3721e2d8d0451a41'
    baidu: ''

# Site header
header:
  navbar:
    enable: true
     # Choose a built-in navigation blox or create your own
    blox: "navbar"
     # Align menu links: `left`, `center`, or `right`
    align: "center"
     # Fix the navigation bar to the top of the page
    fixed_to_top: true
    logo:
      # Logo text
      text: "Guillem Foucault"
      # Logo filename in `assets/media/` folder
      filename: ""
    # Shop a call-to-action button in the top right?
    button:
      enable: false
      text: "Get Started"
      url: "https://hugoblox.com/templates/"
    # Let the user choose between light or dark mode?
    show_theme_chooser: true
    # Let the user search from the navigation bar?
    show_search: true
    # Attempt to automatically highlight the active menu link? Can be disabled for complex sites.
    highlight_active_link: true
    # Show a language chooser (if you have translated your site content)?
    show_translations: true
    # If `show_translations` is enabled, do you wish to hide the current language name?
    hide_language_name: false

# Site footer
footer:
  copyright:
    notice: '© {year}, Guillem Foucault i Llopart.'
    license:
      enable: true
      allow_derivatives: false
      share_alike: true
      allow_commercial: false

# Localization
locale:
  date_format: 'Jan 2, 2006'
  time_format: '3:04 PM'

# Site features
features:
  math:
    enable: false
  privacy_pack:
    enable: false
